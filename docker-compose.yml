services:
  detection:
    build: ./services/detection-service
    container_name: detection-service
    ports:
      - "8001:8000"

  tracking:
    build: ./services/tracking-service
    container_name: tracking-service
    ports:
      - "8002:8000"

  api:
    build: ./services/api-gateway
    container_name: api-gateway
    ports:
      - "8000:8000"
    depends_on:
      - detection
      - tracking